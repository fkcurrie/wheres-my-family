name: Compile iOS TestFlight Release

on:
  push:
    tags:
      - 'v*' # Triggers automatically when pushing a version tag
  workflow_dispatch: # Allows triggering manually from the GitHub UI

jobs:
  build-ios:
    runs-on: macos-26
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Xcode 26.0
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.0'

      - name: Install Apple Certificate & Profile
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          p12-password: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}

      - name: Import Provisioning Profile
        run: |
          PP_PATH=$RUNNER_TEMP/build_pp.mobileprovision
          echo "${{ secrets.APPLE_PROVISIONING_PROFILE_BASE64 }}" | base64 --decode > $PP_PATH
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp $PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles/

      - name: Generate ExportOptions.plist
        run: |
          PROV_PROFILE_UUID=$(security cms -D -i ~/Library/MobileDevice/Provisioning\ Profiles/build_pp.mobileprovision | xmllint --xpath "string(//key[text()='UUID']/following-sibling::string[1])" -)
          cat <<EOF > wheres-my-family-ios/ExportOptions.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>app-store</string>
              <key>teamID</key>
              <string>LSV2MNUNZ8</string>
              <key>signingStyle</key>
              <string>manual</string>
              <key>provisioningProfiles</key>
              <dict>
                  <key>com.example.wheresmyfamilyios</key>
                  <string>$PROV_PROFILE_UUID</string>
              </dict>
          </dict>
          </plist>
          EOF
          echo "Generated ExportOptions.plist with UUID: $PROV_PROFILE_UUID"

      - name: Verify or Download iOS SDK Platforms
        run: |
          xcrun simctl list > /dev/null
          xcodebuild -downloadPlatform iOS || true

      - name: Build & Package iOS App
        run: |
          PROV_PROFILE_UUID=$(security cms -D -i ~/Library/MobileDevice/Provisioning\ Profiles/build_pp.mobileprovision | xmllint --xpath "string(//key[text()='UUID']/following-sibling::string[1])" -)

          cd wheres-my-family-ios
          # Generate Xcode Archive
          xcodebuild -project wheres-my-family-ios.xcodeproj \
                     -scheme wheres-my-family-ios \
                     -sdk iphoneos \
                     -configuration Release \
                     -archivePath $PWD/build/wheres-my-family-ios.xcarchive \
                     DEVELOPMENT_TEAM="LSV2MNUNZ8" \
                     CODE_SIGN_STYLE="Manual" \
                     PROVISIONING_PROFILE_SPECIFIER="$PROV_PROFILE_UUID" \
                     CODE_SIGN_IDENTITY="Apple Distribution" \
                     archive

          # Export IPA
          xcodebuild -exportArchive \
                     -archivePath $PWD/build/wheres-my-family-ios.xcarchive \
                     -exportOptionsPlist ExportOptions.plist \
                     -exportPath $PWD/build/out

      - name: Upload to App Store Connect (TestFlight)
        env:
          ASC_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ISSUER }}
          ASC_KEY_CONTENT: ${{ secrets.APP_STORE_CONNECT_API_KEY_KEY }}
        run: |
          # Write ASC Private Key to local file
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$ASC_KEY_CONTENT" > ~/.appstoreconnect/private_keys/AuthKey_$ASC_KEY_ID.p8

          # Upload via Apple Transporter tool
          xcrun altool --upload-app \
                       -f wheres-my-family-ios/build/out/wheres-my-family-ios.ipa \
                       -t ios \
                       --apiKey "$ASC_KEY_ID" \
                       --apiIssuer "$ASC_ISSUER_ID"
