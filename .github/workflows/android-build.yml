name: Compile Android Release

on:
  push:
    tags:
      - 'v*' # Triggers automatically when pushing a version tag (e.g., v1.0.11)
  workflow_dispatch: # Allows triggering the build manually from the GitHub UI

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Gradle Cache
        uses: gradle/actions/setup-gradle@v4

      - name: Install Android SDK Platform 36
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platforms;android-36"

      - name: Decode Android Keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > wheres-my-family-android/app/release.keystore

      - name: Compile Release Bundle (AAB)
        run: |
          cd wheres-my-family-android
          chmod +x gradlew
          ./gradlew bundleRelease \
            -Pandroid.injected.signing.store.file=$GITHUB_WORKSPACE/wheres-my-family-android/app/release.keystore \
            -Pandroid.injected.signing.store.password=${{ secrets.ANDROID_KEYSTORE_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.ANDROID_KEY_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Upload Production Bundle Artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheres-my-family-android-release
          path: wheres-my-family-android/app/build/outputs/bundle/release/app-release.aab
          if-no-files-found: error

      - name: Upload to Google Play Console
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.ANDROID_PLAY_STORE_JSON }}
          packageName: ca.sfle.wheresmyfamily
          releaseFiles: wheres-my-family-android/app/build/outputs/bundle/release/app-release.aab
          tracks: internal
          whatsNewDirectory: whatsnew
